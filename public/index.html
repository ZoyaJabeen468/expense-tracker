<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">
    <h1>💰 Expense Tracker</h1>

    <!-- Summary -->
    <div class="summary">
      <div class="summary-card">
        <h3>Total Expenses</h3>
        <p id="totalAmount">Rs. 0</p>
      </div>
      <div class="summary-card">
        <h3>Total Records</h3>
        <p id="totalCount">0</p>
      </div>
      <div class="summary-card">
        <h3>Highest Category</h3>
        <p id="highestCategory">-</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-section">
      <h2>📊 Spending by Category</h2>
      <div class="chart-container">
        <canvas id="categoryChart"></canvas>
      </div>
    </div>

    <!-- Add Expense Form -->
    <div class="form-section">
      <h2 id="formTitle">Add New Expense</h2>
      <input type="hidden" id="editId" />
      <div class="form-grid">
        <input type="text" id="title" placeholder="Title *" />
        <input type="number" id="amount" placeholder="Amount (Rs.) *" min="0" />
        <select id="category">
          <option value="">Select Category *</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="date" />
        <input type="text" id="description" placeholder="Description (optional)" />
      </div>
      <div class="form-buttons">
        <button onclick="saveExpense()" class="btn-add">💾 Save Expense</button>
        <button onclick="resetForm()" class="btn-reset">🔄 Reset</button>
      </div>
      <p id="formError" class="error"></p>
    </div>

    <!-- Filter & Search -->
    <div class="filter-section">
      <h2>All Expenses</h2>
      <div class="filter-controls">
        <input type="text" id="searchInput" placeholder="🔍 Search expenses..." oninput="searchExpenses()" />
        <select id="filterCategory" onchange="filterExpenses()">
          <option value="">All Categories</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Education">Education</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
        <input type="date" id="filterFrom" onchange="filterExpenses()" placeholder="From"/>
        <input type="date" id="filterTo" onchange="filterExpenses()" placeholder="To"/>
      </div>
    </div>

    <!-- Expense List -->
    <div id="expenseList" class="expense-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
